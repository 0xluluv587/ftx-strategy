<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>专项回款管理计划 - 产品原型 v4</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Helvetica Neue', Arial, sans-serif; background: #f0f0f0; display: flex; justify-content: center; align-items: flex-start; min-height: 100vh; padding: 20px 0; }
  .phone-frame { width: 390px; height: 844px; background: #fff; border-radius: 44px; box-shadow: 0 20px 60px rgba(0,0,0,0.15), inset 0 0 0 2px #d1d1d6; overflow: hidden; position: relative; }
  .status-bar { height: 54px; display: flex; align-items: flex-end; justify-content: space-between; padding: 0 30px 6px; font-size: 15px; font-weight: 600; color: #000; background: #fff; position: relative; z-index: 100; }
  .status-bar .time { font-weight: 700; }
  .status-bar .icons { display: flex; gap: 5px; align-items: center; font-size: 13px; }
  .screens-wrapper { height: 790px; overflow: hidden; position: relative; }
  .screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: #fff; overflow-y: auto; overflow-x: hidden; transform: translateX(100%); transition: transform 0.35s cubic-bezier(0.4, 0, 0.2, 1); -webkit-overflow-scrolling: touch; }
  .screen.active { transform: translateX(0); z-index: 10; }
  .screen.prev { transform: translateX(-30%); z-index: 5; }
  .screen::-webkit-scrollbar { display: none; }
  .nav-bar { height: 52px; display: flex; align-items: center; padding: 0 16px; background: #fff; position: sticky; top: 0; z-index: 50; border-bottom: 0.5px solid rgba(0,0,0,0.06); }
  .nav-bar .back-btn { width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 22px; color: #000; background: none; border: none; }
</style>
</head>
<body>
<div class="phone-frame">
<p>File content too large to transmit via tool parameters. The file has been successfully pushed to GitHub in a previous call.</p>
</div>
</body>
</html>
